name: Build Gauravi App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
            libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev \
            libdb5.3-dev libgdbm-dev libsqlite3-dev libssl-dev \
            tk-dev libffi-dev python3-dev libtool automake autoconf \
            pkg-config cmake

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Final Build with Auto-Accept
        run: |
          # यह हिस्सा 'Aidl not found' को रोकने के लिए Android SDK सेट करेगा
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # 'yes' कमांड आपके बदले 'y' टाइप करेगी ताकि Broken Pipe न आए
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "True"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gauravi-App-Final
          path: bin/*.apk
